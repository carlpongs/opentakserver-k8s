apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ots-data
  namespace: opentakserver
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 5Gi
