apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentakserver
  namespace: opentakserver
  labels:
    app: opentakserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opentakserver
  template:
    metadata:
      labels:
        app: opentakserver
    spec:
      # Init containers: copy UI files and MediaMTX config into shared volumes
      initContainers:
        - name: copy-ui
          image: ghcr.io/brian7704/opentakserver-ui:master
          command: ["sh", "-c", "cp -r /usr/share/nginx/html/* /webui/ 2>/dev/null || cp -r /* /webui/ 2>/dev/null || echo 'copy done'"]
          volumeMounts:
            - name: webui-files
              mountPath: /webui

        - name: init-mediamtx-config
          image: alpine:3.19
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /app/ots/mediamtx
              wget -q -O /app/ots/mediamtx/mediamtx.yml https://raw.githubusercontent.com/bluenviron/mediamtx/main/mediamtx.yml
              chmod -R 777 /app/ots/mediamtx
              echo 'MediaMTX config downloaded'
          volumeMounts:
            - name: ots-data
              mountPath: /app/ots

      containers:
        # PostgreSQL database (sidecar)
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: ots
            - name: POSTGRES_USER
              value: ots
            - name: POSTGRES_PASSWORD
              value: ots
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

        # RabbitMQ message broker (sidecar)
        - name: rabbitmq
          image: rabbitmq:3-alpine
          ports:
            - containerPort: 5672
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

        # Nginx — serves UI files + proxies /api to OTS backend
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: web-ui
          volumeMounts:
            - name: webui-files
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"

        # OTS backend + CoT streaming servers (eud_handler)
        # The main "opentakserver" binary serves the API on port 8081.
        # The "eud_handler" binary runs the CoT streaming servers:
        #   - TCP on port 8088 (no certs)
        #   - SSL on port 8089 (requires .p12 client cert)
        # Both are delayed 30s to let Postgres initialize.
        - name: opentakserver
          image: ghcr.io/brian7704/opentakserver:1.7.7
          command: ["sh", "-c"]
          args:
            - |
              (sleep 30 && /app/venv/bin/eud_handler) &
              (sleep 30 && /app/venv/bin/eud_handler --ssl) &
              (sleep 30 && /app/venv/bin/cot_parser) &
              (sleep 40 && python3 /scripts/mediamtx-poller.py) &
              exec /app/venv/bin/opentakserver
          env:
            - name: OTS_LISTENER_ADDRESS
              value: "0.0.0.0"
            - name: SECURITY_REGISTERABLE
              value: "true"
          ports:
            - containerPort: 8081
              name: api
            - containerPort: 8443
              name: https
            - containerPort: 8446
              name: cert-enroll
            - containerPort: 8088
              name: tcp-cot
            - containerPort: 8089
              name: ssl-cot
          volumeMounts:
            - name: ots-data
              mountPath: /app/ots
            - name: poller-script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

        # MediaMTX — video streaming server (RTMP/RTSP/WebRTC)
        # OTS communicates with it at localhost:9997 (API)
        # Phones stream RTMP to the NodePort on 1935
        - name: mediamtx
          image: bluenviron/mediamtx:latest
          args: ["/app/ots/mediamtx/mediamtx.yml"]
          ports:
            - containerPort: 1935
              name: rtmp
            - containerPort: 8554
              name: rtsp
            - containerPort: 8889
              name: webrtc
            - containerPort: 9997
              name: mediamtx-api
          volumeMounts:
            - name: ots-data
              mountPath: /app/ots
          env:
            - name: MTX_RTMP
              value: "yes"
            - name: MTX_RTSP
              value: "yes"
            - name: MTX_WEBRTC
              value: "yes"
            - name: MTX_API
              value: "yes"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: ots-data
          persistentVolumeClaim:
            claimName: ots-data
        - name: pg-data
          persistentVolumeClaim:
            claimName: pg-data
        - name: webui-files
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: nginx-config
        - name: poller-script
          configMap:
            name: mediamtx-poller
