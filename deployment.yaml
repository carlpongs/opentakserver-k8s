apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentakserver
  namespace: opentakserver
  labels:
    app: opentakserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opentakserver
  template:
    metadata:
      labels:
        app: opentakserver
    spec:
      # Init container: copy UI static files from the OTS-UI image into shared volume
      initContainers:
        - name: copy-ui
          image: ghcr.io/brian7704/opentakserver-ui:master
          command: ["sh", "-c", "cp -r /usr/share/nginx/html/* /webui/ 2>/dev/null || cp -r /* /webui/ 2>/dev/null || echo 'copy done'"]
          volumeMounts:
            - name: webui-files
              mountPath: /webui

      containers:
        # PostgreSQL database (sidecar)
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: ots
            - name: POSTGRES_USER
              value: ots
            - name: POSTGRES_PASSWORD
              value: ots
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

        # RabbitMQ message broker (sidecar)
        - name: rabbitmq
          image: rabbitmq:3-alpine
          ports:
            - containerPort: 5672
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

        # Nginx — serves UI files + proxies /api to OTS backend
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: web-ui
          volumeMounts:
            - name: webui-files
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"

        # OpenTAK Server backend
        - name: opentakserver
          image: ghcr.io/brian7704/opentakserver:1.7.7
          env:
            - name: OTS_LISTENER_ADDRESS
              value: "0.0.0.0"
            - name: SECURITY_REGISTERABLE
              value: "true"
          ports:
            - containerPort: 8081
              name: api
            - containerPort: 8443
              name: https
            - containerPort: 8446
              name: cert-enroll
            - containerPort: 8088
              name: tcp-cot
            - containerPort: 8089
              name: ssl-cot
          volumeMounts:
            - name: ots-data
              mountPath: /app/ots
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

      volumes:
        - name: ots-data
          persistentVolumeClaim:
            claimName: ots-data
        - name: pg-data
          persistentVolumeClaim:
            claimName: pg-data
        - name: webui-files
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: nginx-config
