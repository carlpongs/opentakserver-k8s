apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: opentakserver
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # Serve the OTS Web UI static files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to OTS backend
        location /api {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Ensure cookies set by backend are forwarded correctly
            proxy_cookie_path / /;
            proxy_cookie_flags ~ nosecure samesite=strict;
        }

        # Proxy WebSocket connections (socket.io)
        location /socket.io {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host 127.0.0.1:8081;
            proxy_set_header Origin http://127.0.0.1:8081;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cookie forwarding for authenticated socket.io
            proxy_cookie_path / /;

            # Override CORS headers: backend returns origin=127.0.0.1:8081
            # but browser expects origin=the actual request origin
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;

            # Disable buffering for real-time events
            proxy_buffering off;
            proxy_cache off;

            # Timeouts for long-lived connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Proxy HLS video playback to MediaMTX
        location /hls/ {
            proxy_pass http://127.0.0.1:8888/hls/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy WebRTC video playback to MediaMTX
        location /webrtc/ {
            proxy_pass http://127.0.0.1:8889/webrtc/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
