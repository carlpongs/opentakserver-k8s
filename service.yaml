apiVersion: v1
kind: Service
metadata:
  name: opentakserver
  namespace: opentakserver
spec:
  type: NodePort
  selector:
    app: opentakserver
  ports:
    - name: web-ui
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: api
      port: 8081
      targetPort: 8081
      nodePort: 30081
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: 30443
    - name: cert-enroll
      port: 8446
      targetPort: 8446
      nodePort: 30446
    - name: tcp-cot
      port: 8088
      targetPort: 8088
      nodePort: 30088
    - name: ssl-cot
      port: 8089
      targetPort: 8089
      nodePort: 30089
