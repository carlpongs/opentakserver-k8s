apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-poller
  namespace: opentakserver
data:
  mediamtx-poller.py: |
    #!/usr/bin/env python3
    """
    MediaMTX stream poller for OpenTAK Server.
    Polls MediaMTX API every 5s to detect new/removed streams,
    and calls the OTS webhook to register/unregister them.
    This exists because MediaMTX's distroless image has no shell.
    """
    import json, time, urllib.request, urllib.error, sys

    MEDIAMTX_API = "http://127.0.0.1:9997"
    OTS_API = "http://127.0.0.1:8081"
    POLL_INTERVAL = 5
    known_paths = set()
    OTS_TOKEN = ""

    def get_paths():
        try:
            r = urllib.request.urlopen(f"{MEDIAMTX_API}/v3/paths/list", timeout=5)
            return json.loads(r.read()).get("items", [])
        except:
            return []

    def webhook(event, path, src_type="", src_id=""):
        url = (f"{OTS_API}/api/mediamtx/webhook?token={OTS_TOKEN}&event={event}"
               f"&path={path}&rtsp_port=8554&source_type={src_type}&source_id={src_id}&query=")
        try:
            req = urllib.request.urlopen(url, timeout=10)
            print(f"[poller] {event} '{path}': {req.status}", flush=True)
        except Exception as e:
            print(f"[poller] {event} '{path}' error: {e}", flush=True)

    # Read token from config
    try:
        with open("/app/ots/config.yml") as f:
            for line in f:
                if "OTS_MEDIAMTX_TOKEN" in line:
                    OTS_TOKEN = line.split(":")[1].strip()
    except:
        pass
    if not OTS_TOKEN:
        print("[poller] No token found, exiting", flush=True)
        sys.exit(1)

    print(f"[poller] Started (interval={POLL_INTERVAL}s)", flush=True)
    while True:
        current = set()
        for item in get_paths():
            name = item.get("name","")
            src = item.get("source")
            if not src or not item.get("ready"): continue
            current.add(name)
            if name not in known_paths:
                print(f"[poller] New stream: {name}", flush=True)
                webhook("ready", name, src.get("type",""), src.get("id",""))
        for gone in known_paths - current:
            print(f"[poller] Stream gone: {gone}", flush=True)
            webhook("notready", gone)
        known_paths = current
        time.sleep(POLL_INTERVAL)
